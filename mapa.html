<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FilmAnalytics — Mapa</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/header.css"/>
  <link rel="stylesheet" href="css/mapa.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #mapa-leaflet {
      width: 100%;
      height: 480px;
      border-radius: 12px;
      z-index: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="inventario.html" class="nav-btn">Explorar</a>
    <a href="graficas.html" class="nav-btn">Gráficas</a>
    <a href="index.html" class="header-logo">
      <img src="assets/images/logo_film.png" alt="" onerror="this.style.display='none'">
      <span class="logo-text">Film<span>Analytics</span></span>
    </a>
    <a href="mapa.html" class="nav-btn active">Mapa</a>
    <a href="predicciones.html" class="nav-btn">Predicciones</a>
  </header>

  <div class="mapa-hero">
    <p class="mapa-hero__eyebrow">Distribución mundial</p>
    <h1 class="mapa-hero__title">Mapa de concentración de películas exitosas</h1>
    <p class="mapa-hero__sub">Recaudación acumulada en box office mundial por región</p>
  </div>

  <div class="mapa-container">
    <div class="mapa-stats" id="mapa-stats">
      <!-- Se rellena desde MariaDB -->
    </div>

    <div class="mapa-img-wrap">
      <div id="mapa-leaflet"></div>
    </div>

    <div>
      <div class="mapa-legend">
        <span class="mapa-legend__title">Intensidad de recaudación:</span>
        <div class="mapa-legend__bar"></div>
      </div>
      <div class="mapa-legend__labels">
        <span>$0B — Baja</span>
        <span>$10B</span>
        <span>$20B</span>
        <span>$30B</span>
        <span>$100B+ — Alta</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Coordenadas por país
    const COORDS = {
      "United States of America": [37.09, -95.71],
      "United Kingdom":           [55.37, -3.43],
      "France":                   [46.22,  2.21],
      "Canada":                   [56.13, -106.34],
      "Germany":                  [51.16,  10.45],
      "Japan":                    [36.20,  138.25],
      "India":                    [20.59,  78.96],
      "Australia":                [-25.27, 133.77],
      "China":                    [35.86,  104.19],
      "Italy":                    [41.87,  12.56],
      "Spain":                    [40.46,  -3.74],
      "South Korea":              [35.90,  127.76],
      "Belgium":                  [50.50,   4.46],
      "Denmark":                  [56.26,   9.50],
      "Ireland":                  [53.41,  -8.24],
      "Mexico":                   [23.63, -102.55],
      "Hong Kong":                [22.39,  114.10],
      "Russia":                   [61.52,  105.31],
      "Brazil":                   [-14.23, -51.92],
      "Czech Republic":           [49.81,  15.47],
    };

    // Inicializar mapa
    const map = L.map('mapa-leaflet').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Cargar datos desde MariaDB
    fetch('api/mapa.php')
      .then(r => r.json())
      .then(data => {

        // Stats cards — top 4 países
        const wrap = document.getElementById('mapa-stats');
        data.slice(0, 4).forEach(p => {
          const revenueB = (p.revenue_total / 1e9).toFixed(1);
          wrap.innerHTML += `
            <div class="stat-card">
              <div class="stat-card__region">${p.pais}</div>
              <div class="stat-card__value">$${revenueB}B</div>
              <div class="stat-card__label">${p.total} películas · ${p.avg_rating}</div>
            </div>`;
        });

        // Calcular máximo revenue para escalar burbujas
        const maxRev = Math.max(...data.map(d => d.revenue_total));

        // Agregar círculos al mapa
        data.forEach(p => {
          const coords = COORDS[p.pais];
          if (!coords) return;

          const radio     = Math.sqrt(p.revenue_total / maxRev) * 80;
          const revenueB  = (p.revenue_total / 1e9).toFixed(2);
          const intensidad = p.revenue_total / maxRev;
          const color     = intensidad > 0.5 ? '#e63946' :
                            intensidad > 0.2 ? '#f4a261' : '#2a9d8f';

          L.circle(coords, {
            radius:      radio * 15000,
            color:       color,
            fillColor:   color,
            fillOpacity: 0.5,
            weight:      1,
          })
          .bindPopup(`
            <strong>${p.pais}</strong><br>
            ${p.total} películas<br>
            $${revenueB}B recaudación<br>
            ${p.avg_rating} rating promedio
          `)
          .addTo(map);
        });

      })
      .catch(err => console.error('Error:', err));
  </script>
</body>
</html>
